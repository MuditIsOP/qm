                        <Filter size={16} /> All Modules
                      </button>
                      
                      {Object.entries(SyllabusModules).map(([key, data]) => (
                        <button
                          key={key}
                          onClick={() => handleTabChange(key)}
                          className={`flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-semibold transition-all whitespace-nowrap shadow-sm border ${
                            activeTab === key 
                              ? 'bg-blue-600 text-white border-blue-600' 
                              : 'bg-white text-slate-600 border-slate-200 hover:border-blue-300 hover:text-blue-600'
                          }`}
                        >
                          {data.icon} {data.title}
                        </button>
                      ))}
                    </div>

                    {/* Topic Filters (Sub-menu) */}
                    <div className="flex overflow-x-auto pb-4 gap-2 no-scrollbar mb-6 items-center">
                        <span className="text-xs font-bold text-slate-400 uppercase mr-2 flex items-center gap-1">
                          <Tag size={12}/> Topics:
                        </span>
                        <button 
                            onClick={() => setActiveTopic('ALL')}
                            className={`px-3 py-1.5 rounded-md text-xs font-bold transition-all whitespace-nowrap border ${
                              activeTopic === 'ALL' 
                                ? 'bg-slate-700 text-white border-slate-700' 
                                : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'
                            }`}
                          >
                            All Topics
                        </button>
                        {availableTopics.map(topic => (
                          <button
                            key={topic}
                            onClick={() => setActiveTopic(topic)}
                            className={`px-3 py-1.5 rounded-md text-xs font-bold transition-all whitespace-nowrap border ${
                              activeTopic === topic 
                                ? 'bg-blue-100 text-blue-700 border-blue-200' 
                                : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50 hover:text-blue-600'
                            }`}
                          >
                            {topic}
                          </button>
                        ))}
                    </div>

                    {/* Info Banner for current module */}
                    {activeTab !== 'ALL' && (
                      <div className="bg-blue-50 border border-blue-100 rounded-xl p-4 mb-6 flex items-start gap-4">
                         <div className="p-2 bg-blue-100 text-blue-600 rounded-lg">
                           {SyllabusModules[activeTab].icon}
                         </div>
                         <div>
                           <h2 className="font-bold text-blue-900 text-lg">{SyllabusModules[activeTab].title}</h2>
                           <p className="text-blue-700">{SyllabusModules[activeTab].subtitle}</p>
                         </div>
                      </div>
                    )}

                    {/* Question Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {filteredQuestions.length > 0 ? (
                        filteredQuestions.map((item) => {
                          const isDone = completed.includes(item.id);
                          const isRevealed = revealedAnswers.includes(item.id);

                          return (
                            <div 
                              key={item.id} 
                              className={`group relative flex flex-col p-5 rounded-xl border transition-all duration-200 hover:shadow-md ${
                                isDone 
                                  ? 'bg-slate-50 border-slate-200 opacity-90' 
                                  : 'bg-white border-slate-200 hover:border-blue-300'
                              }`}
                            >
                              <div className="flex justify-between items-start mb-3">
                                <div className="flex flex-wrap gap-2">
                                   <span className={`px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider ${
                                    item.source === 'PYQ' ? 'bg-amber-100 text-amber-700' :
                                    item.source === 'Assignment' ? 'bg-purple-100 text-purple-700' :
                                    'bg-emerald-100 text-emerald-700'
                                  }`}>
                                    {item.source}
                                  </span>
                                  <span className="px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider bg-slate-100 text-slate-600">
                                    Mod {item.module}
                                  </span>
                                  <span className="px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider bg-blue-50 text-blue-600 border border-blue-100">
                                    {item.topic}
                                  </span>
                                </div>
                                <button 
                                  onClick={() => toggleComplete(item.id)}
                                  className={`transition-colors duration-200 ${isDone ? 'text-green-500' : 'text-slate-300 hover:text-green-400'}`}
                                >
                                  {isDone ? <CheckCircle size={24} className="fill-green-50" /> : <Circle size={24} />}
                                </button>
                              </div>
                              
                              <h3 className={`font-medium text-lg leading-snug mb-4 ${isDone ? 'text-slate-500' : 'text-slate-800'}`}>
                                {item.q}
                              </h3>

                              {/* Answer Section */}
                              <div className="mt-auto pt-2 border-t border-slate-100">
                                {isRevealed ? (
                                  <div className="animate-in fade-in slide-in-from-top-2 duration-300">
                                     <div className="flex items-center justify-between mb-2">
                                       <span className="text-xs font-bold text-slate-400 uppercase">Answer</span>
                                       <button onClick={() => toggleAnswer(item.id)} className="text-slate-400 hover:text-slate-600">
                                         <EyeOff size={16} />
                                       </button>
                                     </div>
                                     <p className="text-sm text-slate-600 leading-relaxed bg-slate-50 p-3 rounded-lg border border-slate-100">
                                       {item.a}
                                     </p>
                                  </div>
                                ) : (
                                  <button 
                                    onClick={() => toggleAnswer(item.id)}
                                    className="w-full py-2 flex items-center justify-center gap-2 text-sm font-semibold text-blue-600 hover:bg-blue-50 rounded-lg transition-colors"
                                  >
                                    <Eye size={16} /> Show Answer
                                  </button>
                                )}
                              </div>
                              
                            </div>
                          );
                        })
                      ) : (
                        <div className="col-span-full py-20 text-center text-slate-400">
                          <div className="mx-auto w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mb-4">
                            <Search size={32} />
                          </div>
                          <p className="text-lg font-medium">No questions found</p>
                          <p className="text-sm">Try adjusting your search or filter.</p>
                        </div>
                      )}
                    </div>
                  </>
                ) : (
                  /* Syllabus View */
                  <div className="max-w-4xl mx-auto space-y-8 animate-in fade-in duration-300">
                    {SyllabusContent.map((mod, index) => (
                      <div key={index} className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                         <div className="bg-slate-50 px-6 py-4 border-b border-slate-200 flex items-center gap-3">
                           <span className="flex items-center justify-center w-8 h-8 rounded-full bg-blue-100 text-blue-600 font-bold text-sm">
                             {mod.module}
                           </span>
                           <h2 className="text-xl font-bold text-slate-800">{mod.title}</h2>
                         </div>
                         <div className="p-6 space-y-6">
                           {mod.sections.map((section, sIdx) => (
                             <div key={sIdx}>
                               <h3 className="text-sm font-bold text-slate-900 uppercase tracking-wide mb-2 flex items-center gap-2">
                                 <Circle size={8} className="fill-blue-500 text-blue-500" />
                                 {section.header}
                               </h3>
                               <p className="text-slate-600 leading-relaxed pl-4 border-l-2 border-slate-100">
                                 {section.content}
                               </p>
                             </div>
                           ))}
                         </div>
                      </div>
                    ))}
                  </div>
                )}

              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
